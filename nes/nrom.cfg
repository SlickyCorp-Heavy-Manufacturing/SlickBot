# ld65 config for an NROM-256 cartridge (mapper 0, 32KB PRG, 8KB CHR)
# with battery-backed PRG-RAM at $6000-$7FFF (for the persistent high score).
MEMORY {
    ZP:     start=$0000, size=$0100, type=rw, define=yes;
    OAM:    start=$0200, size=$0100, type=rw, define=yes;
    RAM:    start=$0300, size=$0500, type=rw, define=yes;
    WRAM:   start=$6000, size=$2000, type=rw, define=yes;
    HEADER: start=$0000, size=$0010, type=ro, file=%O, fill=yes;
    PRG:    start=$8000, size=$8000, type=ro, file=%O, fill=yes, fillval=$FF;
    CHR:    start=$0000, size=$2000, type=ro, file=%O, fill=yes;
}

SEGMENTS {
    HEADER:   load=HEADER, type=ro;
    ZEROPAGE: load=ZP,     type=zp;
    OAMBUF:   load=OAM,    type=bss, define=yes;
    BSS:      load=RAM,    type=bss, define=yes;
    SRAM:     load=WRAM,   type=bss, define=yes;
    CODE:     load=PRG,    type=ro,  start=$8000;
    RODATA:   load=PRG,    type=ro;
    VECTORS:  load=PRG,    type=ro,  start=$FFFA;
    CHARS:    load=CHR,    type=ro;
}
