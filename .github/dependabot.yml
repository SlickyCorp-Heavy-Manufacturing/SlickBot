version: 2
updates:
  - package-ecosystem: npm
    directory: /
    groups:
      npm:
        patterns: ["*"]
    schedule:
      interval: daily
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: daily
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily
